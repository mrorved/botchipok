version: "3.9"

services:
  backend:
    build: ./backend
    container_name: shop_backend
    restart: unless-stopped
    volumes:
      - /opt/shopadmin/data:/app/data
    environment:
      - DATABASE_URL=${DATABASE_URL:-sqlite+aiosqlite:////app/data/shop.db}
      - SECRET_KEY=${SECRET_KEY}
      - BOT_TOKEN=${BOT_TOKEN}
      - BOT_API_SECRET=${BOT_API_SECRET}
      - ADMIN_TELEGRAM_ID=${ADMIN_TELEGRAM_ID:-0}
      - ADMIN_TELEGRAM_IDS=${ADMIN_TELEGRAM_IDS:-}
      - API_BASE_URL=${API_BASE_URL:-http://backend:8000}
    ports:
      - "8001:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 5s
      timeout: 5s
      retries: 15
      start_period: 10s

  bot:
    build: ./bot
    container_name: shop_bot
    restart: unless-stopped
    environment:
      - BOT_TOKEN=${BOT_TOKEN}
      - API_BASE_URL=${API_BASE_URL:-http://backend:8000}
      - BOT_API_SECRET=${BOT_API_SECRET}
    depends_on:
      backend:
        condition: service_healthy

  frontend:
    build: ./frontend
    container_name: shop_frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  data:
