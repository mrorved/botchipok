version: "3.9"

services:
  backend:
    build: ./backend
    container_name: shop_backend
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./data:/app/data
    environment:
      - DATABASE_URL=sqlite+aiosqlite:////app/data/shop.db
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 5s
      timeout: 5s
      retries: 15
      start_period: 10s

  bot:
    build: ./bot
    container_name: shop_bot
    restart: unless-stopped
    env_file: .env
    depends_on:
      backend:
        condition: service_healthy

  frontend:
    build: ./frontend
    container_name: shop_frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  data:
